services:
  postgres:
    image: postgis/postgis:16-3.4

    container_name: spacetrack-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: spacetrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data_pg16:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_data_pg16:
